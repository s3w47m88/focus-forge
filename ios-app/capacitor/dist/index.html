<\!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Loud & Clear</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 20px;
      background: #111;
      border-bottom: 1px solid #333;
    }
    .container {
      flex: 1;
      padding: 20px;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }
    .subtitle {
      color: #888;
      font-size: 14px;
    }
    .task-list {
      margin-top: 30px;
    }
    .task-item {
      background: #111;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .task-checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid #EA580C;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .task-content {
      flex: 1;
    }
    .task-title {
      font-size: 16px;
      margin-bottom: 4px;
    }
    .task-meta {
      font-size: 12px;
      color: #666;
    }
    .loading {
      text-align: center;
      padding: 50px;
      color: #666;
    }
    .add-button {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 56px;
      height: 56px;
      background: #EA580C;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      color: white;
      box-shadow: 0 4px 12px rgba(234, 88, 12, 0.4);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Loud & Clear</h1>
    <div class="subtitle">iOS Version 1.0.0</div>
  </div>
  
  <div class="container">
    <div class="loading">
      <p>Initializing Capacitor bridge...</p>
      <p style="margin-top: 20px; font-size: 12px;">
        This is a placeholder for the iOS app.<br>
        The full Next.js app will be integrated once<br>
        API routes are converted to client-side calls.
      </p>
    </div>
    
    <div class="task-list" style="display: none;">
      <div class="task-item">
        <div class="task-checkbox"></div>
        <div class="task-content">
          <div class="task-title">Sample Task</div>
          <div class="task-meta">Due today</div>
        </div>
      </div>
    </div>
  </div>
  
  <div class="add-button">+</div>
  
  <script>
    // Capacitor bridge will be available here
    document.addEventListener('DOMContentLoaded', function() {
      console.log('Loud & Clear iOS app loaded');
      
      // Check if running in Capacitor
      if (window.Capacitor) {
        console.log('Running in Capacitor environment');
      } else {
        console.log('Running in web browser');
      }
    });
  </script>
</body>
</html>
